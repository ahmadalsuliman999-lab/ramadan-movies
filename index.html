<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع الرسمي لأحمد السليمان</title>
    <style>
        :root { --gold: #ffc107; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 0; margin: 0; }
        
        /* الهيدر الرسمي */
        header { 
            background: linear-gradient(to bottom, #1a1a1a, var(--bg)); 
            padding: 25px 10px; text-align: center; border-bottom: 2px solid var(--gold);
        }
        header h1 { margin: 0; font-size: 1.6rem; color: var(--gold); }

        /* لوحة التحكم: مخفية افتراضياً */
        #adminPanel { 
            display: none; 
            background: #222; padding: 15px; border-radius: 12px; 
            border: 2px solid var(--gold); margin: 15px; 
        }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; }
        
        /* شبكة المجلدات: 3 في الصف الواحد */
        .folders-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .folder-item { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .folder-item:hover { border-color: var(--gold); transform: translateY(-3px); }
        .folder-poster { width: 100%; height: 120px; background: linear-gradient(45deg, #111, #333); display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .folder-name { padding: 8px; font-size: 0.8rem; font-weight: bold; text-align: center; color: var(--gold); }

        /* النافذة المنبثقة */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: flex-start; overflow-y: auto; padding-top: 30px; }
        .modal-body { background: #111; width: 95%; max-width: 800px; border-radius: 20px; border: 1px solid var(--gold); padding: 15px; position: relative; margin-bottom: 50px; }
        
        /* شبكة الحلقات داخل المجلد: حلقتين في الصف الواحد */
        .episodes-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .ep-card { background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .btn { display: block; width: 100%; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; border: none; text-align: center; }
        .add-btn { background: var(--gold); color: black; margin-top: 10px; }
        .close-btn { background: #ff4444; color: white; padding: 5px 15px; border-radius: 8px; margin-bottom: 10px; float: left; cursor: pointer; }
        
        /* الزر السري لفتح لوحة التحكم */
        .secret-trigger { position: fixed; bottom: 0; right: 0; width: 30px; height: 30px; background: transparent; cursor: pointer; z-index: 1000; }

        @media (max-width: 500px) {
            .folder-poster { height: 100px; font-size: 1.5rem; }
            .folder-name { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>الموقع الرسمي لأحمد السليمان</h1>
    </header>

    <div id="adminPanel">
        <h3 style="color:var(--gold); margin:0 0 10px 0;">لوحة المدير 🛠️</h3>
        <input type="text" id="fName" placeholder="اسم المجلد (المسلسل)">
        <input type="text" id="eTitle" placeholder="اسم الحلقة (مثلاً: حلقة 1)">
        <input type="text" id="uLink" placeholder="رابط Google Drive">
        <button class="btn add-btn" onclick="addNewEp()">إضافة الحلقة</button>
        <button onclick="hideAdmin()" style="background:none; color:#777; border:none; margin-top:10px; width:100%; cursor:pointer;">إغلاق اللوحة</button>
    </div>

    <div id="foldersBox" class="folders-grid"></div>

    <div id="modalBox" class="modal-overlay">
        <div class="modal-body">
            <button class="close-btn" onclick="closeFolder()">إغلاق ×</button>
            <div id="modalTitle" style="text-align:center; color:var(--gold); margin-bottom:15px; font-size:1.2rem; clear:both;"></div>
            <div id="episodesBox" class="episodes-container"></div>
        </div>
    </div>

    <div class="secret-trigger" onclick="checkAdmin()"></div>

    <script>
        // استخدام اسم قاعدة البيانات الذي وضعت فيه فيديوهاتك سابقاً لضمان ظهورها
        const DB_NAME = 'ahmed_series_db';

        window.onload = function() { renderUI(); };

        function checkAdmin() {
            const pass = prompt("أدخل كلمة مرور المدير للتحميل:");
            if(pass === "1234") {
                document.getElementById('adminPanel').style.display = 'block';
                window.scrollTo(0,0);
            } else {
                alert("كلمة مرور خاطئة!");
            }
        }

        function hideAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        function addNewEp() {
            const folder = document.getElementById('fName').value.trim();
            const episode = document.getElementById('eTitle').value.trim();
            const url = document.getElementById('uLink').value.trim();
            let id = "";
            if (url.includes('/d/')) id = url.split('/d/')[1].split('/')[0];
            else if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];

            if(folder && episode && id) {
                let db = JSON.parse(localStorage.getItem(DB_NAME)) || [];
                db.push({ folder, episode, id });
                localStorage.setItem(DB_NAME, JSON.stringify(db));
                document.getElementById('eTitle').value = '';
                document.getElementById('uLink').value = '';
                renderUI();
                alert("تمت الإضافة!");
            }
        }

        function renderUI() {
            const grid = document.getElementById('foldersBox');
            const db = JSON.parse(localStorage.getItem(DB_NAME)) || [];
            grid.innerHTML = '';
            const map = {};
            db.forEach(item => {
                if (!map[item.folder]) map[item.folder] = [];
                map[item.folder].push(item);
            });
            for (let name in map) {
                grid.innerHTML += `
                    <div class="folder-item" onclick="openFolder('${name}')">
                        <div class="folder-poster">🎬</div>
                        <div class="folder-name">${name}</div>
                    </div>`;
            }
        }

        function openFolder(name) {
            const db = JSON.parse(localStorage.getItem(DB_NAME)) || [];
            const box = document.getElementById('episodesBox');
            const title = document.getElementById('modalTitle');
            const modal = document.getElementById('modalBox');

            title.innerText = "مسلسل: " + name;
            box.innerHTML = '';
            const episodes = db.filter(item => item.folder === name);

            episodes.forEach((item) => {
                const preview = `https://drive.google.com/file/d/${item.id}/preview`;
                box.innerHTML += `
                    <div class="ep-card">
                        <div class="video-box"><iframe src="${preview}"></iframe></div>
                        <div style="padding:8px; text-align:center; font-size:0.8rem;">${item.episode}</div>
                    </div>`;
            });
            modal.style.display = 'flex';
        }

        function closeFolder() {
            document.getElementById('modalBox').style.display = 'none';
            document.getElementById('episodesBox').innerHTML = ''; // إيقاف الفيديوهات عند الإغلاق
        }
    </script>
</body>
</html>
